name: price-check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - run: pip install requests

      - run: python scripts/check_prices.py
        env:
          ML_ACCESS_TOKEN: ${{ secrets.ML_ACCESS_TOKEN }}
